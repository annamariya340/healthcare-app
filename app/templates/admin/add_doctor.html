{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <div class="text-center mb-4">
                <i class="fas fa-user-md fa-3x text-success"></i>
                <h3 class="mt-2 fw-bold">Add New Doctor</h3>
                <p class="text-muted">Fill in the doctor's details below</p>
            </div>

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label fw-semibold">
                        <i class="fas fa-user me-1"></i>Full Name
                    </label>
                    <input type="text" name="name"
                           class="form-control form-control-lg"
                           placeholder="Doctor's full name" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">
                        <i class="fas fa-envelope me-1"></i>Email
                    </label>
                    <input type="email" name="email"
                           class="form-control form-control-lg"
                           placeholder="Doctor's email" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">
                        <i class="fas fa-phone me-1"></i>Phone
                    </label>
                    <input type="text" name="phone"
                           class="form-control form-control-lg"
                           placeholder="Doctor's phone number">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">
                        <i class="fas fa-lock me-1"></i>Password
                    </label>
                    <input type="password" name="password"
                           class="form-control form-control-lg"
                           placeholder="Set a password" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">
                        <i class="fas fa-stethoscope me-1"></i>Specialization
                    </label>
                    <select name="specialization"
                            class="form-select form-select-lg" required>
                        <option value="">-- Select Specialization --</option>
                        <option>General Physician</option>
                        <option>Cardiologist</option>
                        <option>Dermatologist</option>
                        <option>Neurologist</option>
                        <option>Orthopedic</option>
                        <option>Pediatrician</option>
                        <option>Psychiatrist</option>
                        <option>Gynecologist</option>
                        <option>Dentist</option>
                        <option>ENT Specialist</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">
                        <i class="fas fa-briefcase me-1"></i>
                        Years of Experience
                    </label>
                    <input type="number" name="experience"
                           class="form-control form-control-lg"
                           placeholder="e.g. 5" required>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold">
                        <i class="fas fa-rupee-sign me-1"></i>
                        Consultation Fee
                    </label>
                    <input type="number" name="fee"
                           class="form-control form-control-lg"
                           placeholder="e.g. 500" required>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-success btn-lg">
                        <i class="fas fa-user-plus me-2"></i>Add Doctor
                    </button>
                    <a href="{{ url_for('admin.dashboard') }}"
                       class="btn btn-outline-secondary btn-lg">
                        <i class="fas fa-arrow-left me-2"></i>Back
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
